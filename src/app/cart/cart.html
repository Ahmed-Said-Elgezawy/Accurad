<button (click)="remove(i.id)">Remove</button>
<span>
<!-- <button (click)="decrease(i.id)">-</button>
 {{ i.Quantity }}
<button (click)="increase(i.id)">+</button> -->

<div>Subtotal: {{ i.subtotal }} EGP</div>
</span>
</p>
</div>
